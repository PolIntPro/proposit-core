name: Release

on:
    push:
        tags: ["v*"]

jobs:
    release:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Extract version from tag
              id: version
              run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: Read release notes
              id: notes
              run: |
                  NOTES_FILE="docs/release-notes/${{ steps.version.outputs.version }}.md"
                  if [ -f "$NOTES_FILE" ]; then
                    echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
                  else
                    echo "No release notes found at $NOTES_FILE"
                    exit 1
                  fi

            - name: Create GitHub release
              run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "${{ steps.notes.outputs.file }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
