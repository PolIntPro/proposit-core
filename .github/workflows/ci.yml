name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.23.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type-check
              run: pnpm run typecheck

            - name: Lint
              run: pnpm run lint

            - name: Test
              run: pnpm run test

            - name: Build
              run: pnpm run build
